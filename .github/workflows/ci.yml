name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.25.7"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Run unit tests (all modules)
        run: make test

  codegen-golden:
    name: Codegen Golden Equivalence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Validate all specs (per-spec + cross-spec uniqueness)
        run: make codegen-validate-all

      - name: Run codegen golden comparison (all families)
        run: make codegen-check

      - name: Run codegen unit tests
        run: make codegen-test

      - name: Verify integrated slices match golden snapshots
        run: make codegen-integrated

  behavioral-scenarios:
    name: Behavioral Scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Run behavioral scenario tests (charter-protected surface)
        run: make test-behavioral

      - name: Run behavioral round-trip serialization tests (S255)
        run: make test-behavioral-roundtrip

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Bumped 15→20 in P4.1.8.a: the eventually-poll helper landed in
    # P4.1.8 lets tests run their full observation windows (END-1: 5m,
    # EOW-1: 2m, etc.) instead of fast-failing on the counter race.
    # Workflow needs headroom past Go's `-timeout 18m`.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Start NATS with JetStream enabled
        # GHA services: schema does not support overriding container CMD
        # (no `command:` / `args:` keys). Using `docker run` lets us pass
        # `-js` to the entrypoint to enable JetStream, which
        # `internal/adapters/nats/natsexecution`'s KV usage requires.
        #
        # `--network host` (not `-p HOST:CONTAINER`) because GHA
        # ubuntu-latest runners don't reliably surface published ports
        # on the runner's localhost — `services:` does that networking
        # implicitly; raw `docker run -p` does not. Host networking
        # binds the container directly to the runner's namespace.
        run: |
          set -x
          docker pull nats:2.10.18-alpine
          docker run -d --name nats \
            --network host \
            nats:2.10.18-alpine \
            -js -m 8222
          docker ps --filter name=nats
          # Brief grace before probing (NATS startup is ~5ms but the
          # docker create + start chain can lag by a second).
          sleep 2
          # Wait for NATS readiness. curl --max-time 2 hard-bounds each
          # probe; loop wall-clock ≤ 60s.
          for i in $(seq 1 15); do
            if curl -fsS --max-time 2 http://127.0.0.1:8222/healthz >/dev/null 2>&1; then
              echo "NATS ready after ${i} polls"
              exit 0
            fi
            sleep 2
          done

          echo "=== NATS failed to become ready within 60 seconds. Diagnostics: ==="
          echo ""
          echo "--- docker ps --filter name=nats ---"
          docker ps --filter name=nats || true
          echo ""
          echo "--- docker logs nats (tail 40) ---"
          docker logs --tail 40 nats || true
          echo ""
          echo "--- docker inspect nats (network) ---"
          docker inspect nats --format '{{json .HostConfig.NetworkMode}}' || true
          docker inspect nats --format '{{json .NetworkSettings}}' || true
          echo ""
          echo "--- Ports listening on runner ---"
          ss -tlnp 2>/dev/null | head -20 || netstat -tlnp 2>/dev/null | head -20 || true
          echo ""
          echo "--- Verbose curl probe (one attempt) ---"
          set +e
          curl -v --max-time 3 http://127.0.0.1:8222/healthz 2>&1 | head -20
          curl_rc=$?
          set -e
          echo "curl exit code: $curl_rc"
          exit 1

      - name: Run integration tests (NATS via docker run)
        run: make test-integration
        env:
          NATS_URL: nats://localhost:4222

      - name: Stop NATS container
        if: always()
        run: docker rm -f nats 2>/dev/null || true

  smoke-composed:
    name: Smoke Composed Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Run composed pipeline smoke (stackless Go tests)
        run: make smoke-composed

  repository-checks:
    name: Repository Consistency & Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Install Rust toolchain (for raccoon-cli)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable channel @ 2026-05-22 (no semver tags)

      - name: Cache raccoon-cli build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: tools/raccoon-cli/target
          key: raccoon-${{ runner.os }}-${{ hashFiles('tools/raccoon-cli/Cargo.lock', 'tools/raccoon-cli/src/**/*.rs') }}
          restore-keys: raccoon-${{ runner.os }}-

      - name: Run repository consistency checks
        run: make repo-consistency-check

      - name: Run quality gate (CI profile)
        run: make quality-gate-ci

  lint-go:
    name: Go Lint (golangci-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.12.2
          install-mode: binary
          install-only: true

      - name: Run lint-go (iterates workspace modules)
        run: ./scripts/lint-go.sh
