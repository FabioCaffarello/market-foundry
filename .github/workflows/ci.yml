name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.25.7"

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Run unit tests (all modules)
        run: make test

  codegen-golden:
    name: Codegen Golden Equivalence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Validate all specs (per-spec + cross-spec uniqueness)
        run: make codegen-validate-all

      - name: Run codegen golden comparison (all families)
        run: make codegen-check

      - name: Run codegen unit tests
        run: make codegen-test

      - name: Verify integrated slices match golden snapshots
        run: make codegen-integrated

  behavioral-scenarios:
    name: Behavioral Scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Run behavioral scenario tests (charter-protected surface)
        run: make test-behavioral

      - name: Run behavioral round-trip serialization tests (S255)
        run: make test-behavioral-roundtrip

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Start NATS with JetStream enabled
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10.18-alpine \
            -js
          # GHA services: schema does not support overriding container
          # CMD (no `command:` / `args:` keys). Using `docker run` lets us
          # pass `-js` to the entrypoint to enable JetStream, which
          # `internal/adapters/nats/natsexecution`'s KV usage requires.
          for i in $(seq 1 15); do
            if wget -qO- http://127.0.0.1:8222/healthz >/dev/null 2>&1; then
              echo "NATS ready after ${i} polls"
              exit 0
            fi
            sleep 2
          done
          echo "NATS failed to become ready within 30 seconds"
          docker logs nats || true
          exit 1

      - name: Run integration tests (NATS via docker run)
        run: make test-integration
        env:
          NATS_URL: nats://localhost:4222

      - name: Stop NATS container
        if: always()
        run: docker rm -f nats 2>/dev/null || true

  smoke-composed:
    name: Smoke Composed Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Run composed pipeline smoke (stackless Go tests)
        run: make smoke-composed

  repository-checks:
    name: Repository Consistency & Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Install Rust toolchain (for raccoon-cli)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable channel @ 2026-05-22 (no semver tags)

      - name: Cache raccoon-cli build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: tools/raccoon-cli/target
          key: raccoon-${{ runner.os }}-${{ hashFiles('tools/raccoon-cli/Cargo.lock', 'tools/raccoon-cli/src/**/*.rs') }}
          restore-keys: raccoon-${{ runner.os }}-

      - name: Run repository consistency checks
        run: make repo-consistency-check

      - name: Run quality gate (CI profile)
        run: make quality-gate-ci

  lint-go:
    name: Go Lint (golangci-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.12.2
          install-mode: binary
          install-only: true

      - name: Run lint-go (iterates workspace modules)
        run: ./scripts/lint-go.sh

  smoke-analytical:
    name: Smoke Analytical E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            **/go.sum
            go.work

      - name: Build service binaries
        run: make build

      - name: Materialize compose env file for CI runner
        run: cp deploy/envs/local.env.example deploy/envs/local.env

      - name: Start stack (compose up)
        run: make up
        env:
          DOCKER_BUILDKIT: 1

      - name: Wait for infrastructure readiness
        run: ./scripts/ci-wait-ready.sh --timeout 120

      - name: Seed configctl
        run: make seed

      - name: Wait for writer flush
        run: sleep ${WRITER_FLUSH_WAIT:-120}
        env:
          WRITER_FLUSH_WAIT: "120"

      - name: Run smoke-analytical E2E
        run: make smoke-analytical

      - name: Scan for error-level logs
        if: always()
        run: |
          echo "--- Error log scan ---"
          ERROR_COUNT=$(docker compose -f deploy/compose/docker-compose.yaml logs --no-log-prefix 2>/dev/null | grep -c '"level":"error"' || echo "0")
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "WARNING: Found $ERROR_COUNT error-level log entries"
            docker compose -f deploy/compose/docker-compose.yaml logs --no-log-prefix 2>/dev/null | grep '"level":"error"' | tail -10
          else
            echo "No error-level log entries found"
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f deploy/compose/docker-compose.yaml logs --tail=200 > /tmp/compose-logs.txt 2>&1
          echo "--- Writer logs ---"
          docker compose -f deploy/compose/docker-compose.yaml logs --tail=100 writer 2>&1 || true
          echo "--- Gateway logs ---"
          docker compose -f deploy/compose/docker-compose.yaml logs --tail=100 gateway 2>&1 || true

      - name: Upload logs artifact on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: compose-logs
          path: /tmp/compose-logs.txt
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: make down
