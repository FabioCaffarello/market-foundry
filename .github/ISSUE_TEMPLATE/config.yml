  - name: Contributing guide
    url: https://github.com/FabioCaffarello/market-foundry/blob/main/docs/CONTRIBUTING.md
    about: Operating protocols, PR workflow, and contribution rules.

  - name: Architecture decisions
    url: https://github.com/FabioCaffarello/market-foundry/blob/main/docs/decisions/README.md
    about: ADRs documenting structural decisions. Useful before proposing changes that touch architecture.
