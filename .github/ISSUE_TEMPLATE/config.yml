# Configuration for GitHub issue templates.
# See https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository

blank_issues_enabled: true

contact_links:
  - name: Current state and known gaps
    url: https://github.com/FabioCaffarello/market-foundry/blob/main/docs/RESUMPTION.md
