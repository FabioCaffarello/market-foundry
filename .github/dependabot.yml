# Dependabot configuration for market-foundry
#
# Monitors dependencies in 3 ecosystems:
# - Go modules (17 workspace modules, listed individually)
# - Cargo (tools/raccoon-cli/)
# - GitHub Actions (.github/workflows/)
#
# Policy:
# - Weekly cadence (Sunday 06:00 UTC).
# - No auto-merge: all dependency PRs require manual review.
# - Max 5 open PRs per ecosystem (avoid PR avalanche).
# - Commit prefix: chore(deps) per project convention.
# - Labels: 'dependencies' + ecosystem-specific.
#
# Adopted in P2.4 of Phase 2 (environment hardening).
# See docs/CONTRIBUTING.md for PR review workflow.

version: 2

updates:
  # === Go workspace modules ===
  # Listed individually because Dependabot doesn't support workspace-wide
  # globbing. Each module's go.sum is monitored separately.
  # Source of truth: go.work `use (...)` block (17 modules as of P2.4).

  - package-ecosystem: "gomod"
    directory: "/codegen"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

