# Subject composition policy — consumed by `raccoon-cli check subjects`.
#
# Enforces the ADR-0009 erratum (2026-06-10, Onda H-6.e): the {symbol}
# token of every published NATS subject is derived exclusively via
# CanonicalInstrument.SubjectToken(). The scan is BLOCK-scoped (only
# inside `subject := fmt.Sprintf(` calls in production publisher
# files). Sections accreted per sub-onda: [subjects] H-6.e,
# [keys] H-6.e.2, [dedup] H-6.f.1. Log labels remain the only
# message-adjacent surface where VenueSymbol() is still legal —
# until its deletion in H-6.f.2 (pós-TTL ~2026-08-26).

[subjects]
scan_root = "internal/adapters/nats"
file_suffix = "publisher.go"
subject_marker = "subject := fmt.Sprintf("
forbidden_call = "VenueSymbol()"

# H-6.e.2: KV partition-key invariant. PartitionKey() implementations
# compose {source}.{SubjectToken()}.{timeframe} — the transitory
# VenueSymbol() is forbidden in key composition from this sub-wave on.
[keys]
scan_root = "internal/domain"
func_marker = ") PartitionKey() string {"
forbidden_call = "VenueSymbol()"
required_call = "SubjectToken()"

# H-6.f.1: JetStream dedup-key invariant (Decisão #4). Dedup keys were
# the last message surface deriving an instrument token via the
# transitory VenueSymbol(). Two scanned surfaces:
#
#   1. Domain `DeduplicationKey()` composers (func-scoped, mirrors
#      [keys]). VenueSymbol() is forbidden in every body;
#      SubjectToken() is required only for the receivers listed in
#      required_receivers — the composers whose key embeds an
#      instrument token. SessionLifecycleEvent (session identity) and
#      ObservationTrade (source + venue TradeID) compose from
#      non-instrument identity and are intentionally absent.
#   2. Publisher inline `dedupKey :=` assignments (assignment-scoped:
#      natsevidence candle/burst/vol + natsexecution rejection).
#      VenueSymbol() forbidden; no required_call here because the
#      fill key (VenueOrderID) and the composer-delegating
#      assignments legitimately carry no instrument token.
#
# Transition note: canonicalizing the key text breaks JetStream's
# 2-minute duplicate window (default — natskit.StreamSpec.Config()
# sets no explicit Duplicates) exactly once at deploy; accepted
# single-operator risk, documented in the H-6.f.1 PR and RESUMPTION.
[dedup]
domain_scan_root = "internal/domain"
func_marker = ") DeduplicationKey() string {"
publisher_scan_root = "internal/adapters/nats"
publisher_file_suffix = "publisher.go"
inline_marker = "dedupKey :="
forbidden_call = "VenueSymbol()"
required_call = "SubjectToken()"
required_receivers = [
    "ExecutionIntent",
    "Decision",
    "RiskAssessment",
    "Strategy",
    "Signal",
]
