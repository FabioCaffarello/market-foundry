# Grafana dashboard provisioning — market-foundry observability.
#
# Declarative dashboard provider; loads any *.json under the
# `path` directory into the Observability folder at startup.
# Dashboards filled by H-5 commit 8.

apiVersion: 1
providers:
  - name: market-foundry-observability
    orgId: 1
    folder: Observability
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
