x-service-defaults: &service-defaults
  init: true
  restart: unless-stopped
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  networks:
    - market-foundry-network

x-go-build: &go-build
  context: ../..
  dockerfile: deploy/docker/go-service.Dockerfile

x-go-service: &go-service
  <<: *service-defaults
  stop_grace_period: 15s

services:
  nats:
    <<: *service-defaults
    image: nats:2.10.18-alpine
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - ../nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  configctl:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: configctl
    image: market-foundry/configctl:dev
    command: ["-config", "/etc/market-foundry/configctl.jsonc"]
    volumes:
      - ../configs/configctl.jsonc:/etc/market-foundry/configctl.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz | grep -q 'ready'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8.8
    container_name: market-foundry-clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse/
      - clickhouse_logs:/var/log/clickhouse-server/
      - ../clickhouse/config/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
      - ../clickhouse/config/backup-disk.xml:/etc/clickhouse-server/config.d/backup-disk.xml:ro
      - ../clickhouse/users/default-user.xml:/etc/clickhouse-server/users.d/default-user.xml
      - ../../backups/clickhouse:/backups
    cap_add:
      - SYS_NICE
    networks:
      - market-foundry-network
    env_file:
      - ../envs/local.env
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --port 9000 --user default --password clickhouse --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.00"

  gateway:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: gateway
    image: market-foundry/gateway:dev
    command: ["-config", "/etc/market-foundry/gateway.jsonc"]
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ../configs/gateway.jsonc:/etc/market-foundry/gateway.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
      configctl:
        condition: service_healthy
      store:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/readyz | grep -q 'ready'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  ingest:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: ingest
    image: market-foundry/ingest:dev
    command: ["-config", "/etc/market-foundry/ingest.jsonc"]
    volumes:
      - ../configs/ingest.jsonc:/etc/market-foundry/ingest.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
      configctl:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8082/readyz | grep -q 'ready'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  derive:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: derive
    image: market-foundry/derive:dev
    command: ["-config", "/etc/market-foundry/derive.jsonc"]
    volumes:
      - ../configs/derive.jsonc:/etc/market-foundry/derive.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8083/readyz | grep -q 'ready'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  store:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: store
    image: market-foundry/store:dev
    command: ["-config", "/etc/market-foundry/store.jsonc"]
    volumes:
      - ../configs/store.jsonc:/etc/market-foundry/store.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
      derive:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8081/readyz | grep -q 'ready'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  execute:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: execute
    image: market-foundry/execute:dev
    command: ["-config", "/etc/market-foundry/execute.jsonc"]
    volumes:
      - ../configs/execute.jsonc:/etc/market-foundry/execute.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
      derive:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8084/readyz | grep -q 'ready'"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  writer:
    <<: *go-service
    build:
      <<: *go-build
      args:
        SERVICE: writer
    image: market-foundry/writer:dev
    command: ["-config", "/etc/market-foundry/writer.jsonc"]
    volumes:
      - ../configs/writer.jsonc:/etc/market-foundry/writer.jsonc:ro
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8085/readyz | grep -q 'ready'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ── Observability profile (opt-in via --profile observability) ──
  # Added in Onda H-5 (PROGRAM-0003, Fase Observability). Both
  # services are opt-in via `docker compose --profile observability up`
  # (or `make obs-up`); they do NOT come up under the default
  # `make up` to keep the baseline stack lean for devs not
  # actively working on observability.
  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    container_name: market-foundry-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/recording.rules.yml:/etc/prometheus/recording.rules.yml:ro
      - ../observability/prometheus/alerts.rules.yml:/etc/prometheus/alerts.rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9090/-/healthy >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  grafana:
    <<: *service-defaults
    image: grafana/grafana:11.2.2
    profiles: ["observability"]
    container_name: market-foundry-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

networks:
  market-foundry-network:
    driver: bridge

volumes:
  nats_data:
    name: market-foundry-nats-data
  clickhouse_data:
    name: market-foundry-clickhouse-data
  clickhouse_logs:
    name: market-foundry-clickhouse-logs
  prometheus_data:
    name: market-foundry-prometheus-data
  grafana_data:
    name: market-foundry-grafana-data
